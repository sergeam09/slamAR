<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>SLAM AR</title>
  <!-- Copyright Niantic Spatial — binary-only license -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
          async crossorigin="anonymous"
          data-preload-chunks="slam"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:100vw; height:100vh; overflow:hidden; background:#000; font-family:sans-serif; }

    #overlay {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#111; color:#fff; z-index:10; gap:14px;
      transition:opacity 0.5s;
    }
    .spinner {
      width:48px; height:48px;
      border:4px solid #333; border-top-color:#00e5ff;
      border-radius:50%; animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #overlay p { font-size:13px; color:#aaa; text-align:center; max-width:260px; line-height:1.6; }

    #status {
      position:fixed; top:20px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.6); color:#fff; font-size:13px;
      padding:8px 18px; border-radius:20px; z-index:20;
      pointer-events:none; white-space:nowrap; transition:opacity 0.4s;
    }

    #crosshair {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:32px; height:32px; z-index:20; pointer-events:none; opacity:0.5;
    }
    #crosshair::before,#crosshair::after {
      content:''; position:absolute; background:#00e5ff; border-radius:2px;
    }
    #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
    #crosshair::after  { width:100%; height:2px; top:50%; transform:translateY(-50%); }

    #ui {
      position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
      display:none; gap:10px; z-index:20;
    }
    .btn {
      padding:13px 20px; border-radius:50px; border:none;
      cursor:pointer; font-size:14px; font-weight:bold;
      backdrop-filter:blur(8px); transition:transform 0.1s;
    }
    .btn:active { transform:scale(0.93); }
    #btn-place   { background:rgba(0,229,255,0.9); color:#000; }
    #btn-clear   { background:rgba(255,60,60,0.8); color:#fff; }
    #btn-recenter{ background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.3); }

    #canvas {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      display:block;
    }
  </style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <strong>Iniciando SLAM…</strong>
  <p>Mueve el teléfono lentamente apuntando al suelo para calibrar el espacio.</p>
</div>

<div id="status">Calibrando…</div>
<div id="crosshair"></div>
<div id="ui">
  <button class="btn" id="btn-recenter">↺ Recentrar</button>
  <button class="btn" id="btn-place">＋ Colocar</button>
  <button class="btn" id="btn-clear">✕ Borrar</button>
</div>

<canvas id="canvas"></canvas>

<script>
const overlay  = document.getElementById('overlay')
const statusEl = document.getElementById('status')
const ui       = document.getElementById('ui')
const canvas   = document.getElementById('canvas')

let xrScene, xrCamera, count = 0
const placed = []

// Log visible en pantalla para depurar en móvil
const log = (msg) => {
  console.log(msg)
  statusEl.style.opacity = '1'
  statusEl.textContent = msg
}
window.onerror = (msg, src, line) => log(`ERROR: ${msg} (${line})`)
window.addEventListener('unhandledrejection', e => log(`PROMISE ERR: ${e.reason}`))

const COLORS = [0x00e5ff, 0xff6b6b, 0xffd93d, 0x6bcb77, 0xc77dff, 0xff9f43]

function setStatus(msg, fade) {
  statusEl.textContent = msg
  statusEl.style.opacity = '1'
  if (fade) setTimeout(() => { statusEl.style.opacity = '0' }, fade)
}

function showUI() {
  overlay.style.opacity = '0'
  setTimeout(() => { overlay.style.display = 'none' }, 500)
  ui.style.display = 'flex'
  setStatus('¡Listo! Toca el botón para colocar objetos', 3000)
}

function makeShape(index) {
  const THREE = window.THREE
  if (!THREE) return null
  const geo = [
    new THREE.BoxGeometry(0.2, 0.2, 0.2),
    new THREE.SphereGeometry(0.13, 16, 16),
    new THREE.CylinderGeometry(0.08, 0.08, 0.24, 16),
    new THREE.ConeGeometry(0.13, 0.26, 16),
    new THREE.TorusGeometry(0.1, 0.04, 12, 24),
  ][index % 5]
  const mat = new THREE.MeshStandardMaterial({ color: COLORS[index % COLORS.length] })
  return new THREE.Mesh(geo, mat)
}

function placeObject() {
  if (!xrScene || !xrCamera) { setStatus('SLAM aún no listo', 2000); return }

  const THREE = window.THREE
  const mesh = makeShape(count)
  if (!mesh) return

  // Posición: 1.5m frente a la cámara, en Y=0 (suelo)
  const dir = new THREE.Vector3(0, 0, -1)
    .applyQuaternion(xrCamera.quaternion)
  dir.y = 0
  dir.normalize()

  mesh.position.set(
    xrCamera.position.x + dir.x * 1.5,
    0.1,
    xrCamera.position.z + dir.z * 1.5
  )

  mesh.userData.rotSpeed = 0.5 + Math.random() * 0.8
  xrScene.add(mesh)
  placed.push(mesh)
  count++

  setStatus(`Objeto #${count} colocado`, 2000)
}

function clearObjects() {
  placed.forEach(m => xrScene && xrScene.remove(m))
  placed.length = 0
  count = 0
  setStatus('Escena limpia', 2000)
}

// Esperar a que XR8 esté listo
window.addEventListener('xrloaded', () => {
  log('xrloaded OK')

  try {
    log('GlTextureRenderer: ' + (typeof XR8.GlTextureRenderer))
    log('Threejs: ' + (typeof XR8.Threejs))
    log('XrController: ' + (typeof XR8.XrController))
  } catch(e) { log('CHECK ERR: ' + e.message) }

  XR8.addCameraPipelineModules([
    XR8.GlTextureRenderer.pipelineModule(),
    XR8.Threejs.pipelineModule(),
    XR8.XrController.pipelineModule(),
    {
      name: 'slam-app',
      onStart() {
        log('onStart OK')
        const s = XR8.Threejs.xrScene()
        xrScene  = s.scene
        xrCamera = s.camera

        const THREE = window.THREE
        xrScene.add(new THREE.AmbientLight(0xffffff, 0.8))
        const dir = new THREE.DirectionalLight(0xffffff, 0.6)
        dir.position.set(2, 4, 2)
        xrScene.add(dir)

        setTimeout(showUI, 2500)
      },
      onUpdate() {
        // Rotar objetos colocados
        placed.forEach(m => {
          m.rotation.y += 0.01 * m.userData.rotSpeed
        })
      },
    }
  ])

  XR8.XrController.configure({ disableWorldTracking: false })
  XR8.run({ canvas })
})

// Botones
document.getElementById('btn-place').addEventListener('click', placeObject)
document.getElementById('btn-clear').addEventListener('click', clearObjects)
document.getElementById('btn-recenter').addEventListener('click', () => {
  XR8.XrController.recenter()
  setStatus('Recentrado', 2000)
})

// Tap en pantalla también coloca
canvas.addEventListener('click', placeObject)
</script>
</body>
</html>
