<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>SLAM AR</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
          crossorigin="anonymous"
          data-preload-chunks="slam"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:sans-serif; }
    #camerafeed { position:fixed; top:0; left:0; width:100%!important; height:100%!important; display:block; z-index:0; }
    #status {
      position:fixed; top:16px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.7); color:#fff; font-size:12px;
      padding:7px 16px; border-radius:20px; z-index:20;
      pointer-events:none; text-align:center; max-width:90vw;
    }
    #overlay {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#111; color:#fff; z-index:10; gap:14px; transition:opacity 0.5s;
    }
    .spinner { width:48px; height:48px; border:4px solid #333; border-top-color:#00e5ff; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #overlay p { font-size:13px; color:#aaa; text-align:center; max-width:260px; line-height:1.6; }
    #ui { position:fixed; bottom:36px; left:50%; transform:translateX(-50%); display:none; gap:10px; z-index:20; }
    .btn { padding:13px 22px; border-radius:50px; border:none; cursor:pointer; font-size:14px; font-weight:bold; backdrop-filter:blur(10px); transition:transform 0.1s; }
    .btn:active { transform:scale(0.93); }
    #btn-place    { background:rgba(0,229,255,0.9); color:#000; }
    #btn-clear    { background:rgba(255,60,60,0.8); color:#fff; }
    #btn-recenter { background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.3); }
    #crosshair {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      width:44px; height:44px; z-index:20; pointer-events:none; display:none;
    }
    #crosshair::before, #crosshair::after { content:''; position:absolute; border-radius:2px; background:rgba(0,229,255,0.9); }
    #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
    #crosshair::after  { width:100%; height:2px; top:50%; transform:translateY(-50%); }
  </style>
</head>
<body>
<canvas id="camerafeed"></canvas>
<div id="overlay">
  <div class="spinner"></div>
  <strong>Calibrando SLAM…</strong>
  <p>Mueve el teléfono lentamente apuntando al suelo.</p>
</div>
<div id="status">Cargando…</div>
<div id="crosshair"></div>
<div id="ui">
  <button class="btn" id="btn-recenter">↺ Recentrar</button>
  <button class="btn" id="btn-place">＋ Colocar</button>
  <button class="btn" id="btn-clear">✕ Borrar</button>
</div>

<script>
const canvas   = document.getElementById('camerafeed')
const overlay  = document.getElementById('overlay')
const statusEl = document.getElementById('status')
const ui       = document.getElementById('ui')
const crosshair = document.getElementById('crosshair')

canvas.width  = window.innerWidth
canvas.height = window.innerHeight
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth
  canvas.height = window.innerHeight
})

// ── Escena propia separada de XR8 ────────────────────────────────────────
// XR8 mueve su escena interna. Nosotros tenemos UNA escena separada
// y la renderizamos manualmente usando el pose real de la cámara.
const arScene    = new THREE.Scene()
const arCamera   = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 1000)
let   arRenderer = null

arScene.add(new THREE.AmbientLight(0xffffff, 0.7))
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8)
dirLight.position.set(1, 3, 2)
arScene.add(dirLight)

let count = 0
const placed = []
const COLORS = [0x00e5ff, 0xff6b6b, 0xffd93d, 0x6bcb77, 0xc77dff, 0xff9f43]

function setStatus(msg) { statusEl.textContent = msg }

function showUI() {
  overlay.style.opacity = '0'
  setTimeout(() => { overlay.style.display = 'none' }, 500)
  ui.style.display        = 'flex'
  crosshair.style.display = 'block'
  setStatus('Apunta al suelo y toca Colocar')
}

function placeObject(clientX, clientY) {
  // Usar hitTest de XR8 para obtener posición en el mundo real
  const nx = clientX / window.innerWidth
  const ny = clientY / window.innerHeight
  const hits = XR8.XrController.hitTest(nx, ny, ['FEATURE_POINT', 'ESTIMATED_SURFACE'])

  let worldPos
  if (hits && hits.length > 0) {
    const h = hits[0]
    worldPos = new THREE.Vector3(h.position.x, h.position.y, h.position.z)
  } else {
    // Fallback: 1.2m frente a la cámara en el plano horizontal
    const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(arCamera.quaternion)
    fwd.y = 0; fwd.normalize().multiplyScalar(1.2)
    worldPos = new THREE.Vector3(
      arCamera.position.x + fwd.x,
      arCamera.position.y - 1.0,
      arCamera.position.z + fwd.z
    )
  }

  const geos = [
    new THREE.BoxGeometry(0.12, 0.12, 0.12),
    new THREE.SphereGeometry(0.08, 16, 16),
    new THREE.CylinderGeometry(0.05, 0.05, 0.14, 16),
    new THREE.ConeGeometry(0.08, 0.16, 16),
    new THREE.TorusGeometry(0.07, 0.025, 12, 24),
  ]
  const mat = new THREE.MeshStandardMaterial({ color: COLORS[count % COLORS.length], roughness: 0.3 })
  const mesh = new THREE.Mesh(geos[count % geos.length], mat)
  mesh.position.copy(worldPos)
  mesh.position.y += 0.06
  mesh.userData.rotSpeed = 0.4 + Math.random() * 0.6

  arScene.add(mesh)
  placed.push(mesh)
  count++
  setStatus(`Objeto #${count} colocado`)
}

function clearObjects() {
  placed.forEach(m => arScene.remove(m))
  placed.length = 0; count = 0
  setStatus('Escena limpia')
}

const onxrloaded = () => {
  XR8.addCameraPipelineModules([
    XR8.GlTextureRenderer.pipelineModule(),  // feed de cámara
    XR8.XrController.pipelineModule(),        // SLAM — solo tracking, sin Three.js
    {
      name: 'slam-app',

      onStart({ canvas: c, GLctx }) {
        // Crear renderer propio usando el contexto WebGL de XR8
        arRenderer = new THREE.WebGLRenderer({
          canvas: c,
          context: GLctx,
          alpha: true,
          antialias: true,
        })
        arRenderer.autoClear    = false  // XR8 ya limpia el canvas con el feed de cámara
        arRenderer.setPixelRatio(window.devicePixelRatio)
        arRenderer.setSize(window.innerWidth, window.innerHeight)

        arCamera.aspect = window.innerWidth / window.innerHeight
        arCamera.updateProjectionMatrix()

        // Inicializar proyección con el pose inicial
        XR8.XrController.updateCameraProjectionMatrix({
          origin: { x: 0, y: 0, z: 0 },
          facing: { x: 0, y: 0, z: 0, w: 1 },
        })

        showUI()
      },

      onUpdate({ processCpuResult }) {
        if (!processCpuResult?.reality) return
        const { position, rotation, intrinsics } = processCpuResult.reality
        if (!position || !rotation) return

        // Aplicar pose SLAM directamente a nuestra cámara
        arCamera.position.set(position.x, position.y, position.z)
        arCamera.quaternion.set(rotation.x, rotation.y, rotation.z, rotation.w)

        // Actualizar FOV desde intrínsecos de la cámara real
        if (intrinsics) {
          for (let i = 0; i < 16; i++) {
            arCamera.projectionMatrix.elements[i] = intrinsics[i]
          }
          arCamera.projectionMatrixInverse.copy(arCamera.projectionMatrix).invert()
        }

        // Rotar objetos
        placed.forEach(m => { m.rotation.y += 0.008 * m.userData.rotSpeed })
      },

      onRender() {
        // Renderizar nuestra escena encima del feed de cámara
        if (arRenderer) {
          arRenderer.render(arScene, arCamera)
        }
      },
    }
  ])

  XR8.XrController.configure({ disableWorldTracking: false })
  XR8.run({ canvas, allowedDevices: XR8.XrConfig.device().ANY })

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault()
    placeObject(e.touches[0].clientX, e.touches[0].clientY)
  }, { passive: false })
}

window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded)

document.getElementById('btn-place').addEventListener('click', () =>
  placeObject(window.innerWidth / 2, window.innerHeight / 2))
document.getElementById('btn-clear').addEventListener('click', clearObjects)
document.getElementById('btn-recenter').addEventListener('click', () => {
  XR8.XrController.recenter()
  setStatus('Recentrado')
})

window.onerror = (msg, src, line) => setStatus(`ERR: ${msg} L${line}`)
window.addEventListener('unhandledrejection', e => setStatus(`ERR: ${e.reason}`))
</script>
</body>
</html>
