<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>SLAM Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
          crossorigin="anonymous"
          data-preload-chunks="slam"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:monospace; }
    #camerafeed { position:fixed; top:0; left:0; width:100% !important; height:100% !important; display:block; z-index:0; }
    #log {
      position:fixed; top:0; left:0; right:0;
      background:rgba(0,0,0,0.82);
      color:#0f0; font-size:11px; line-height:1.6;
      padding:8px; z-index:30; max-height:60vh; overflow-y:auto;
    }
    #log .err { color:#f66; }
    #log .ok  { color:#6f6; }
    #log .inf { color:#6cf; }
    #log .warn{ color:#fa0; }
    #btn-place {
      position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
      padding:14px 32px; border-radius:50px; border:none;
      background:rgba(0,229,255,0.9); color:#000;
      font-size:15px; font-weight:bold; z-index:30; cursor:pointer;
    }
  </style>
</head>
<body>
<canvas id="camerafeed"></canvas>
<div id="log"></div>
<button id="btn-place">＋ Colocar objeto</button>

<script>
const logEl  = document.getElementById('log')
const canvas = document.getElementById('camerafeed')

canvas.width  = window.innerWidth
canvas.height = window.innerHeight

let frameCount = 0
let scene, camera
let lastPos = null
const placed = []

function log(msg, type='') {
  const d = new Date()
  const t = `${d.getMinutes()}:${String(d.getSeconds()).padStart(2,'0')}`
  const line = document.createElement('div')
  line.className = type
  line.textContent = `[${t}] ${msg}`
  logEl.appendChild(line)
  logEl.scrollTop = logEl.scrollHeight
  // Máximo 40 líneas
  while (logEl.children.length > 40) logEl.removeChild(logEl.firstChild)
}

window.onerror = (msg, src, line) => log(`JS ERROR: ${msg} (L${line})`, 'err')
window.addEventListener('unhandledrejection', e => log(`PROMISE: ${e.reason}`, 'err'))

log('Página cargada', 'inf')
log(`innerWidth=${window.innerWidth} innerHeight=${window.innerHeight}`, 'inf')
log(`devicePixelRatio=${window.devicePixelRatio}`, 'inf')

// Detectar xrloaded
window.addEventListener('xrloaded', () => log('✓ xrloaded', 'ok'))

const onxrloaded = () => {
  log('Iniciando XR8...', 'inf')

  try {
    XR8.addCameraPipelineModules([
      XR8.GlTextureRenderer.pipelineModule(),
      XR8.Threejs.pipelineModule(),
      XR8.XrController.pipelineModule(),
      {
        name: 'debug-app',
        onStart({ canvas: c }) {
          log('✓ onStart', 'ok')
          try {
            const s = XR8.Threejs.xrScene()
            scene  = s.scene
            camera = s.camera
            log(`✓ xrScene OK — cam pos: ${JSON.stringify(camera.position)}`, 'ok')

            XR8.XrController.updateCameraProjectionMatrix({
              origin: camera.position,
              facing: camera.quaternion,
            })
            log('✓ updateCameraProjectionMatrix OK', 'ok')

            scene.add(new THREE.AmbientLight(0xffffff, 0.8))
          } catch(e) {
            log(`onStart ERROR: ${e.message}`, 'err')
          }
        },

        onUpdate({ processCpuResult }) {
          frameCount++

          // Log cada 60 frames (~2s)
          if (frameCount % 60 === 0) {
            if (camera) {
              const p = camera.position
              const posStr = `${p.x.toFixed(2)},${p.y.toFixed(2)},${p.z.toFixed(2)}`

              // Detectar si la cámara se mueve (SLAM trackeando)
              if (lastPos) {
                const dx = Math.abs(p.x - lastPos.x)
                const dy = Math.abs(p.y - lastPos.y)
                const dz = Math.abs(p.z - lastPos.z)
                const moved = dx + dy + dz
                if (moved > 0.001) {
                  log(`CAM pos:(${posStr}) Δ:${moved.toFixed(4)} ← SLAM trackeando`, 'ok')
                } else {
                  log(`CAM pos:(${posStr}) Δ:0 ← SLAM ESTÁTICO (no trackea)`, 'warn')
                }
              } else {
                log(`CAM pos inicial:(${posStr})`, 'inf')
              }
              lastPos = { x: p.x, y: p.y, z: p.z }
            }

            // Revisar si processCpuResult tiene datos de reality
            if (processCpuResult) {
              const keys = Object.keys(processCpuResult)
              if (frameCount === 60) log(`processCpuResult keys: [${keys.join(',')}]`, 'inf')
              if (processCpuResult.reality) {
                const r = processCpuResult.reality
                const rkeys = Object.keys(r)
                if (frameCount === 60) log(`reality keys: [${rkeys.join(',')}]`, 'inf')
                if (r.position) {
                  const rp = r.position
                  log(`REALITY pos:(${rp.x?.toFixed(3)},${rp.y?.toFixed(3)},${rp.z?.toFixed(3)})`, 'ok')
                }
              } else {
                if (frameCount <= 120) log('processCpuResult.reality: undefined', 'warn')
              }
            }
          }

          // Rotar objetos colocados
          placed.forEach(m => { m.rotation.y += 0.01 })
        },

        onRender() {},
      }
    ])

    XR8.XrController.configure({ disableWorldTracking: false })
    log('Llamando XR8.run()...', 'inf')
    XR8.run({ canvas, allowedDevices: XR8.XrConfig.device().ANY })
    log('✓ XR8.run() llamado', 'ok')

  } catch(e) {
    log(`ERROR en setup: ${e.message}`, 'err')
  }

  // Colocar objeto con raycaster
  document.getElementById('btn-place').addEventListener('click', () => {
    if (!scene || !camera) { log('scene/camera no listo', 'err'); return }

    try {
      const raycaster = new THREE.Raycaster()
      raycaster.setFromCamera(new THREE.Vector2(0, 0), camera)

      // Plano Y=0
      const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0)
      const target = new THREE.Vector3()
      raycaster.ray.intersectPlane(plane, target)

      log(`hitTest Y=0: (${target.x.toFixed(3)},${target.y.toFixed(3)},${target.z.toFixed(3)})`, 'inf')

      // También intentar XR8.XrController.hitTest
      try {
        const hits = XR8.XrController.hitTest(0.5, 0.5, ['FEATURE_POINT', 'ESTIMATED_SURFACE'])
        log(`XR8.hitTest results: ${hits?.length ?? 0}`, hits?.length ? 'ok' : 'warn')
        if (hits?.length) {
          log(`hitTest[0]: type=${hits[0].type} pos=(${hits[0].position?.x?.toFixed(3)},${hits[0].position?.y?.toFixed(3)},${hits[0].position?.z?.toFixed(3)})`, 'ok')
        }
      } catch(he) {
        log(`XR8.hitTest ERROR: ${he.message}`, 'err')
      }

      // Colocar cubo en la intersección
      const geo = new THREE.BoxGeometry(0.15, 0.15, 0.15)
      const mat = new THREE.MeshStandardMaterial({ color: 0x00e5ff })
      const mesh = new THREE.Mesh(geo, mat)
      mesh.position.copy(target)
      mesh.position.y += 0.075
      scene.add(mesh)
      placed.push(mesh)
      log(`Cubo #${placed.length} colocado en (${mesh.position.x.toFixed(2)},${mesh.position.y.toFixed(2)},${mesh.position.z.toFixed(2)})`, 'ok')
    } catch(e) {
      log(`placeObject ERROR: ${e.message}`, 'err')
    }
  })
}

window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded)
</script>
</body>
</html>
