<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>SLAM AR</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
          crossorigin="anonymous"
          data-preload-chunks="slam"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:sans-serif; }
    #camerafeed { position:fixed; top:0; left:0; width:100% !important; height:100% !important; display:block; z-index:0; }

    #status {
      position:fixed; top:16px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.7); color:#fff; font-size:12px;
      padding:7px 16px; border-radius:20px; z-index:20;
      pointer-events:none; text-align:center; max-width:90vw;
    }

    #overlay {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#111; color:#fff; z-index:10; gap:14px; transition:opacity 0.5s;
    }
    .spinner { width:48px; height:48px; border:4px solid #333; border-top-color:#00e5ff; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #overlay p { font-size:13px; color:#aaa; text-align:center; max-width:260px; line-height:1.6; }

    /* Barra de progreso del mapa SLAM */
    #slam-progress {
      position:fixed; bottom:0; left:0; right:0; height:3px;
      background:rgba(255,255,255,0.1); z-index:21; display:none;
    }
    #slam-progress-bar {
      height:100%; width:0%; background:#00e5ff;
      transition:width 0.3s; border-radius:0 2px 2px 0;
    }

    #ui { position:fixed; bottom:36px; left:50%; transform:translateX(-50%); display:none; gap:10px; z-index:20; }
    .btn { padding:13px 22px; border-radius:50px; border:none; cursor:pointer; font-size:14px; font-weight:bold; backdrop-filter:blur(10px); transition:transform 0.1s, opacity 0.2s; }
    .btn:active { transform:scale(0.93); }
    .btn:disabled { opacity:0.35; cursor:not-allowed; }
    #btn-place    { background:rgba(0,229,255,0.9); color:#000; }
    #btn-clear    { background:rgba(255,60,60,0.8); color:#fff; }
    #btn-recenter { background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.3); }
  </style>
</head>
<body>
<canvas id="camerafeed"></canvas>

<div id="overlay">
  <div class="spinner"></div>
  <strong>Iniciando SLAM…</strong>
  <p>Mueve el teléfono lentamente apuntando al suelo para mapear el espacio.</p>
</div>

<div id="status">Cargando…</div>
<div id="slam-progress"><div id="slam-progress-bar"></div></div>

<div id="ui">
  <button class="btn" id="btn-recenter">↺ Recentrar</button>
  <button class="btn" id="btn-place" disabled>Apuntando…</button>
  <button class="btn" id="btn-clear">✕ Borrar</button>
</div>

<script>
const canvas      = document.getElementById('camerafeed')
const overlay     = document.getElementById('overlay')
const statusEl    = document.getElementById('status')
const ui          = document.getElementById('ui')
const btnPlace    = document.getElementById('btn-place')
const progressBar = document.getElementById('slam-progress-bar')
const progressWrap= document.getElementById('slam-progress')

canvas.width  = window.innerWidth
canvas.height = window.innerHeight
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth
  canvas.height = window.innerHeight
})

// ─── Estado ────────────────────────────────────────────────────────────────
let scene, camera
let reticle       = null   // Cursor 3D que sigue al suelo detectado
let worldMapReady = false  // El SLAM tiene suficiente mapa para dar hits confiables
let currentHit    = null   // Último hit {x,y,z,qx,qy,qz,qw} en coords mundo
let count = 0
const placed = []
const COLORS = [0x00e5ff, 0xff6b6b, 0xffd93d, 0x6bcb77, 0xc77dff, 0xff9f43]

// ─── UI helpers ────────────────────────────────────────────────────────────
function setStatus(msg) { statusEl.textContent = msg }

function showUI() {
  overlay.style.opacity = '0'
  setTimeout(() => { overlay.style.display = 'none' }, 500)
  ui.style.display  = 'flex'
  progressWrap.style.display = 'block'
}

// ─── Reticle (cursor en el suelo detectado) ────────────────────────────────
function createReticle() {
  const geo = new THREE.RingGeometry(0.08, 0.11, 32)
  // El RingGeometry está en XY, rotarlo para que quede horizontal
  geo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2))
  const mat = new THREE.MeshBasicMaterial({
    color: 0x00e5ff, side: THREE.DoubleSide, transparent: true, opacity: 0.85,
  })
  reticle = new THREE.Mesh(geo, mat)
  reticle.visible = false

  const dotGeo = new THREE.CircleGeometry(0.015, 16)
  dotGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2))
  reticle.add(new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })))

  scene.add(reticle)
}

// ─── Actualizar reticle con hit test del centro de pantalla ────────────────
function updateReticle() {
  if (!worldMapReady) return

  // 0.5, 0.5 = centro exacto de la pantalla (normalizado 0–1)
  const hits = XR8.XrController.hitTest(0.5, 0.5, ['FEATURE_POINT', 'ESTIMATED_SURFACE'])

  if (hits && hits.length > 0) {
    const h = hits[0]
    const p = h.position
    const q = h.rotation  // quaternion de la normal de la superficie

    reticle.position.set(p.x, p.y, p.z)
    if (q) reticle.quaternion.set(q.x, q.y, q.z, q.w)
    reticle.visible = true

    currentHit = { x: p.x, y: p.y, z: p.z, qx: q?.x||0, qy: q?.y||0, qz: q?.z||0, qw: q?.w||1 }
    btnPlace.textContent = '＋ Colocar'
    btnPlace.disabled    = false
  } else {
    reticle.visible   = false
    currentHit        = null
    btnPlace.textContent = 'Apuntando…'
    btnPlace.disabled    = true
  }
}

// ─── Colocar objeto en la posición anclada del hit test ───────────────────
function placeObject() {
  if (!scene || !currentHit) return

  const geos = [
    new THREE.BoxGeometry(0.12, 0.12, 0.12),
    new THREE.SphereGeometry(0.08, 16, 16),
    new THREE.CylinderGeometry(0.05, 0.05, 0.14, 16),
    new THREE.ConeGeometry(0.08, 0.16, 16),
    new THREE.TorusGeometry(0.07, 0.025, 12, 24),
  ]
  const mat  = new THREE.MeshStandardMaterial({
    color: COLORS[count % COLORS.length], roughness: 0.3, metalness: 0.2,
  })
  const mesh = new THREE.Mesh(geos[count % geos.length], mat)

  // Usar exactamente las coordenadas del mundo devueltas por hitTest
  mesh.position.set(currentHit.x, currentHit.y, currentHit.z)
  mesh.position.y += 0.06   // Elevar medio objeto para que pose sobre la superficie
  mesh.userData.rotSpeed = 0.4 + Math.random() * 0.6

  scene.add(mesh)
  placed.push(mesh)
  count++
  setStatus(`Objeto #${count} anclado`)
}

function clearObjects() {
  placed.forEach(m => scene && scene.remove(m))
  placed.length = 0
  count = 0
  setStatus('Escena limpia')
}

// ─── Pipeline de XR8 ───────────────────────────────────────────────────────
const onxrloaded = () => {
  XR8.addCameraPipelineModules([
    XR8.GlTextureRenderer.pipelineModule(),
    XR8.Threejs.pipelineModule(),
    XR8.XrController.pipelineModule(),
    {
      name: 'slam-app',

      onStart() {
        const s = XR8.Threejs.xrScene()
        scene  = s.scene
        camera = s.camera

        XR8.XrController.updateCameraProjectionMatrix({
          origin: camera.position,
          facing: camera.quaternion,
        })

        scene.add(new THREE.AmbientLight(0xffffff, 0.8))
        const dir = new THREE.DirectionalLight(0xffffff, 0.9)
        dir.position.set(1, 3, 2)
        scene.add(dir)

        createReticle()
        showUI()
        setStatus('Mueve el teléfono para mapear el suelo…')
      },

      onUpdate({ processCpuResult }) {
        // Calidad del mapa SLAM (0.0 – 1.0)
        const quality = processCpuResult?.reality?.slam?.quality ?? 0
        progressBar.style.width = `${Math.round(quality * 100)}%`

        // Habilitar hit-test sólo cuando el mapa tiene suficiente confianza
        if (!worldMapReady && quality >= 0.3) {
          worldMapReady = true
          progressWrap.style.display = 'none'
          setStatus('Apunta al suelo — toca para colocar')
        }

        updateReticle()

        // Animar objetos colocados
        placed.forEach(m => { m.rotation.y += 0.008 * m.userData.rotSpeed })
      },
    }
  ])

  XR8.XrController.configure({ disableWorldTracking: false })
  XR8.run({ canvas, allowedDevices: XR8.XrConfig.device().ANY })

  // Toque en pantalla coloca en donde apunta el reticle
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault()
    placeObject()
  }, { passive: false })
}

window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded)

btnPlace.addEventListener('click', placeObject)
document.getElementById('btn-clear').addEventListener('click', clearObjects)
document.getElementById('btn-recenter').addEventListener('click', () => {
  XR8.XrController.recenter()
  worldMapReady = false
  currentHit    = null
  if (reticle) reticle.visible = false
  btnPlace.textContent = 'Apuntando…'
  btnPlace.disabled    = true
  progressWrap.style.display = 'block'
  progressBar.style.width = '0%'
  setStatus('Recentrado — mueve el teléfono para remapear')
})

window.onerror = (msg, src, line) => setStatus(`ERR: ${msg} L${line}`)
window.addEventListener('unhandledrejection', e => setStatus(`ERR: ${e.reason}`))
</script>
</body>
</html>
