<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>SLAM AR</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <!-- Copyright Niantic Spatial — binary-only license, commercial use permitted -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
          crossorigin="anonymous"
          data-preload-chunks="slam"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:sans-serif; }

    #camerafeed {
      position:fixed; top:0; left:0;
      width:100% !important; height:100% !important;
      display:block; z-index:0;
    }

    #overlay {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#111; color:#fff; z-index:10; gap:14px; transition:opacity 0.5s;
    }
    .spinner {
      width:48px; height:48px; border:4px solid #333; border-top-color:#00e5ff;
      border-radius:50%; animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #overlay p { font-size:13px; color:#aaa; text-align:center; max-width:260px; line-height:1.6; }

    #status {
      position:fixed; top:20px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.6); color:#fff; font-size:13px;
      padding:8px 18px; border-radius:20px; z-index:20;
      pointer-events:none; transition:opacity 0.4s; white-space:nowrap;
    }

    #crosshair {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:44px; height:44px; z-index:20; pointer-events:none; display:none;
    }
    #crosshair::before, #crosshair::after {
      content:''; position:absolute; border-radius:2px;
      background:rgba(255,255,255,0.85);
    }
    #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
    #crosshair::after  { width:100%; height:2px; top:50%; transform:translateY(-50%); }

    #ui {
      position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
      display:none; gap:10px; z-index:20;
    }
    .btn {
      padding:13px 22px; border-radius:50px; border:none;
      cursor:pointer; font-size:14px; font-weight:bold;
      backdrop-filter:blur(10px); transition:transform 0.1s;
    }
    .btn:active { transform:scale(0.93); }
    #btn-place    { background:rgba(0,229,255,0.9); color:#000; }
    #btn-clear    { background:rgba(255,60,60,0.8); color:#fff; }
    #btn-recenter { background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.3); }
  </style>
</head>
<body>

<!-- Canvas en el HTML con ID fijo — XR8 lo busca por ID -->
<canvas id="camerafeed"></canvas>

<div id="overlay">
  <div class="spinner"></div>
  <strong>Calibrando SLAM…</strong>
  <p>Apunta la cámara al suelo y mueve el teléfono lentamente.</p>
</div>

<div id="status">Cargando…</div>
<div id="crosshair"></div>

<div id="ui">
  <button class="btn" id="btn-recenter">↺ Recentrar</button>
  <button class="btn" id="btn-place">＋ Colocar aquí</button>
  <button class="btn" id="btn-clear">✕ Borrar todo</button>
</div>

<script>
const overlay   = document.getElementById('overlay')
const statusEl  = document.getElementById('status')
const ui        = document.getElementById('ui')
const crosshair = document.getElementById('crosshair')
const canvas    = document.getElementById('camerafeed')

// ── Tamaño real del canvas ANTES de que XR8 lo use ──────────────────────
function resizeCanvas() {
  canvas.width  = window.innerWidth
  canvas.height = window.innerHeight
}
resizeCanvas()
window.addEventListener('resize', resizeCanvas)

let xrScene, xrCamera
let count = 0
const anchors = []
const COLORS  = [0x00e5ff, 0xff6b6b, 0xffd93d, 0x6bcb77, 0xc77dff, 0xff9f43]

function setStatus(msg, fade) {
  statusEl.textContent = msg
  statusEl.style.opacity = '1'
  if (fade) setTimeout(() => { statusEl.style.opacity = '0' }, fade)
}

function showUI() {
  overlay.style.opacity = '0'
  setTimeout(() => { overlay.style.display = 'none' }, 500)
  ui.style.display        = 'flex'
  crosshair.style.display = 'block'
  setStatus('Apunta al suelo y toca "Colocar aquí"', 4000)
}

function placeObject(clientX, clientY) {
  if (!xrScene || !xrCamera) { setStatus('Calibrando…', 1500); return }

  const x = clientX / window.innerWidth
  const y = clientY / window.innerHeight

  const hits = XR8.XrController.hitTest(x, y, ['FEATURE_POINT', 'ESTIMATED_SURFACE'])

  let worldPos
  if (hits && hits.length > 0) {
    const best = hits.find(h => h.type === 'ESTIMATED_SURFACE') || hits[0]
    worldPos = new THREE.Vector3(best.position.x, best.position.y, best.position.z)
  } else {
    // Fallback al plano Y=0
    const camPos  = new THREE.Vector3()
    const camQuat = new THREE.Quaternion()
    xrCamera.getWorldPosition(camPos)
    xrCamera.getWorldQuaternion(camQuat)
    const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camQuat)
    fwd.y = 0; fwd.normalize().multiplyScalar(1.2)
    worldPos = new THREE.Vector3(camPos.x + fwd.x, 0, camPos.z + fwd.z)
    setStatus('Sin superficie — estimando', 2000)
  }

  const anchor = new THREE.Object3D()
  anchor.position.copy(worldPos)
  anchor.matrixAutoUpdate = false
  anchor.updateMatrix()

  const geos = [
    new THREE.BoxGeometry(0.15, 0.15, 0.15),
    new THREE.SphereGeometry(0.1, 16, 16),
    new THREE.CylinderGeometry(0.06, 0.06, 0.18, 16),
    new THREE.ConeGeometry(0.1, 0.2, 16),
    new THREE.TorusGeometry(0.08, 0.03, 12, 24),
  ]
  const mat = new THREE.MeshStandardMaterial({
    color: COLORS[count % COLORS.length], roughness: 0.3, metalness: 0.2,
  })
  const mesh = new THREE.Mesh(geos[count % geos.length], mat)
  mesh.userData.rotSpeed = 0.4 + Math.random() * 0.6
  anchor.add(mesh)

  xrScene.add(anchor)
  anchors.push(anchor)
  count++

  if (hits && hits.length > 0) {
    setStatus(`Objeto #${count} anclado en superficie`, 2500)
  }
}

function clearObjects() {
  anchors.forEach(a => xrScene && xrScene.remove(a))
  anchors.length = 0; count = 0
  setStatus('Escena limpia', 2000)
}

// ── XR8 ─────────────────────────────────────────────────────────────────
const onxrloaded = () => {
  XR8.addCameraPipelineModules([
    XR8.GlTextureRenderer.pipelineModule(),
    XR8.Threejs.pipelineModule(),
    XR8.XrController.pipelineModule(),
    {
      name: 'slam-app',
      onStart() {
        const { scene, camera } = XR8.Threejs.xrScene()
        xrScene  = scene
        xrCamera = camera
        xrScene.add(new THREE.AmbientLight(0xffffff, 0.7))
        const dir = new THREE.DirectionalLight(0xffffff, 0.8)
        dir.position.set(1, 3, 2)
        xrScene.add(dir)
        showUI()
      },
      onUpdate() {
        anchors.forEach(a => {
          if (a.children[0]) a.children[0].rotation.y += 0.008 * a.children[0].userData.rotSpeed
        })
      },
    }
  ])

  XR8.XrController.configure({ disableWorldTracking: false })
  XR8.run({ canvas, allowedDevices: XR8.XrConfig.device().ANY })

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault()
    placeObject(e.touches[0].clientX, e.touches[0].clientY)
  }, { passive: false })
}

window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded)

document.getElementById('btn-place').addEventListener('click', () =>
  placeObject(window.innerWidth / 2, window.innerHeight / 2))
document.getElementById('btn-clear').addEventListener('click', clearObjects)
document.getElementById('btn-recenter').addEventListener('click', () => {
  XR8.XrController.recenter()
  setStatus('Recentrado', 2000)
})

window.onerror = (msg, src, line) => setStatus(`ERR: ${msg} L${line}`)
window.addEventListener('unhandledrejection', e => setStatus(`ERR: ${e.reason}`))
</script>
</body>
</html>
