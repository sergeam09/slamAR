<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>SLAM AR</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
          crossorigin="anonymous"
          data-preload-chunks="slam"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:sans-serif; }
    #camerafeed { position:fixed; top:0; left:0; width:100% !important; height:100% !important; display:block; z-index:0; }
    #status {
      position:fixed; top:16px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.7); color:#fff; font-size:12px;
      padding:7px 16px; border-radius:20px; z-index:20;
      pointer-events:none; text-align:center; max-width:90vw;
    }
    #overlay {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#111; color:#fff; z-index:10; gap:14px; transition:opacity 0.5s;
    }
    .spinner { width:48px; height:48px; border:4px solid #333; border-top-color:#00e5ff; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #overlay p { font-size:13px; color:#aaa; text-align:center; max-width:260px; line-height:1.6; }
    #ui { position:fixed; bottom:36px; left:50%; transform:translateX(-50%); display:none; gap:10px; z-index:20; }
    .btn { padding:13px 22px; border-radius:50px; border:none; cursor:pointer; font-size:14px; font-weight:bold; backdrop-filter:blur(10px); transition:transform 0.1s; }
    .btn:active { transform:scale(0.93); }
    #btn-place    { background:rgba(0,229,255,0.9); color:#000; }
    #btn-clear    { background:rgba(255,60,60,0.8); color:#fff; }
    #btn-recenter { background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.3); }
    #crosshair {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      width:44px; height:44px; z-index:20; pointer-events:none; display:none;
    }
    #crosshair::before, #crosshair::after { content:''; position:absolute; border-radius:2px; background:rgba(0,229,255,0.9); }
    #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
    #crosshair::after  { width:100%; height:2px; top:50%; transform:translateY(-50%); }
  </style>
</head>
<body>
<canvas id="camerafeed"></canvas>

<div id="overlay">
  <div class="spinner"></div>
  <strong>Calibrando SLAM…</strong>
  <p>Mueve el teléfono lentamente apuntando al suelo para mapear el espacio.</p>
</div>

<div id="status">Cargando…</div>
<div id="crosshair"></div>
<div id="ui">
  <button class="btn" id="btn-recenter">↺ Recentrar</button>
  <button class="btn" id="btn-place">＋ Colocar</button>
  <button class="btn" id="btn-clear">✕ Borrar</button>
</div>

<script>
const canvas    = document.getElementById('camerafeed')
const overlay   = document.getElementById('overlay')
const statusEl  = document.getElementById('status')
const ui        = document.getElementById('ui')
const crosshair = document.getElementById('crosshair')

canvas.width  = window.innerWidth
canvas.height = window.innerHeight
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth
  canvas.height = window.innerHeight
})

let scene, camera
let initialY = null   // Y de la cámara cuando arrancó XR8
let groundY  = null   // Y estimado del suelo = initialY - altura del usuario (~1.5m)
let count = 0
const placed = []
const COLORS = [0x00e5ff, 0xff6b6b, 0xffd93d, 0x6bcb77, 0xc77dff, 0xff9f43]

function setStatus(msg) {
  statusEl.textContent = msg
  statusEl.style.opacity = '1'
}

function showUI() {
  overlay.style.opacity = '0'
  setTimeout(() => { overlay.style.display = 'none' }, 500)
  ui.style.display        = 'flex'
  crosshair.style.display = 'block'
}

function placeObject(clientX, clientY) {
  if (!scene || !camera) return

  // Intentar XR8.hitTest primero
  const nx = clientX / window.innerWidth
  const ny = clientY / window.innerHeight
  const hits = XR8.XrController.hitTest(nx, ny, ['FEATURE_POINT', 'ESTIMATED_SURFACE'])

  let pos

  if (hits && hits.length > 0) {
    // Usar el hit más cercano
    const h = hits[0]
    pos = new THREE.Vector3(h.position.x, h.position.y, h.position.z)
    setStatus(`Objeto #${count+1} en FEATURE_POINT`)
  } else {
    // Fallback: raycaster hacia adelante de la cámara hasta el plano del suelo estimado
    const camPos  = new THREE.Vector3()
    const camQuat = new THREE.Quaternion()
    camera.getWorldPosition(camPos)
    camera.getWorldQuaternion(camQuat)

    // El suelo está a initialY - 1.5m (altura típica sosteniendo el teléfono)
    const estimatedGround = groundY !== null ? groundY : camPos.y - 1.5

    // Calcular punto 1.2m frente a la cámara proyectado al suelo estimado
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camQuat)
    // Intersección del rayo con el plano horizontal del suelo
    if (Math.abs(dir.y) > 0.001) {
      const t = (estimatedGround - camPos.y) / dir.y
      if (t > 0) {
        pos = new THREE.Vector3(
          camPos.x + dir.x * t,
          estimatedGround,
          camPos.z + dir.z * t
        )
      }
    }
    if (!pos) {
      // último fallback: 1.2m al frente en el plano horizontal
      dir.y = 0; dir.normalize()
      pos = new THREE.Vector3(
        camPos.x + dir.x * 1.2,
        estimatedGround,
        camPos.z + dir.z * 1.2
      )
    }
    setStatus(`Objeto #${count+1} (estimado, mueve más el teléfono)`)
  }

  const geos = [
    new THREE.BoxGeometry(0.12, 0.12, 0.12),
    new THREE.SphereGeometry(0.08, 16, 16),
    new THREE.CylinderGeometry(0.05, 0.05, 0.14, 16),
    new THREE.ConeGeometry(0.08, 0.16, 16),
    new THREE.TorusGeometry(0.07, 0.025, 12, 24),
  ]
  const mat = new THREE.MeshStandardMaterial({
    color: COLORS[count % COLORS.length], roughness: 0.3, metalness: 0.2,
  })
  const mesh = new THREE.Mesh(geos[count % geos.length], mat)
  mesh.position.copy(pos)
  mesh.position.y += 0.06
  mesh.userData.rotSpeed = 0.4 + Math.random() * 0.6

  scene.add(mesh)
  placed.push(mesh)
  count++
}

function clearObjects() {
  placed.forEach(m => scene && scene.remove(m))
  placed.length = 0; count = 0
  setStatus('Escena limpia')
}

const onxrloaded = () => {
  XR8.addCameraPipelineModules([
    XR8.GlTextureRenderer.pipelineModule(),
    XR8.Threejs.pipelineModule(),
    XR8.XrController.pipelineModule(),
    {
      name: 'slam-app',
      onStart() {
        const s = XR8.Threejs.xrScene()
        scene  = s.scene
        camera = s.camera

        XR8.XrController.updateCameraProjectionMatrix({
          origin: camera.position,
          facing: camera.quaternion,
        })

        scene.add(new THREE.AmbientLight(0xffffff, 0.7))
        const dir = new THREE.DirectionalLight(0xffffff, 0.8)
        dir.position.set(1, 3, 2)
        scene.add(dir)

        showUI()
        setStatus('Apunta al suelo y mueve el teléfono')
      },

      onUpdate({ processCpuResult }) {
        // Capturar Y inicial de la cámara para estimar el suelo
        if (initialY === null && camera) {
          initialY = camera.position.y
          groundY  = initialY - 1.5
        }

        // Si XR8 reporta reality.position, refinar el suelo
        if (processCpuResult?.reality?.position && initialY !== null) {
          const ry = processCpuResult.reality.position.y
          // El suelo está ~1.5m debajo de la cámara cuando la sostienes
          groundY = ry - 1.5
        }

        placed.forEach(m => { m.rotation.y += 0.008 * m.userData.rotSpeed })
      },
    }
  ])

  XR8.XrController.configure({ disableWorldTracking: false })
  XR8.run({ canvas, allowedDevices: XR8.XrConfig.device().ANY })

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault()
    placeObject(e.touches[0].clientX, e.touches[0].clientY)
  }, { passive: false })
}

window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded)

document.getElementById('btn-place').addEventListener('click', () =>
  placeObject(window.innerWidth / 2, window.innerHeight / 2))
document.getElementById('btn-clear').addEventListener('click', clearObjects)
document.getElementById('btn-recenter').addEventListener('click', () => {
  XR8.XrController.recenter()
  initialY = null; groundY = null
  setStatus('Recentrado — apunta al suelo')
})

window.onerror = (msg, src, line) => setStatus(`ERR: ${msg} L${line}`)
window.addEventListener('unhandledrejection', e => setStatus(`ERR: ${e.reason}`))
</script>
</body>
</html>
