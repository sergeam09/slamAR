<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>SLAM AR</title>
  <!-- Copyright Niantic Spatial — binary-only license, commercial use permitted -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
          async crossorigin="anonymous"
          data-preload-chunks="slam"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:100vw; height:100vh; overflow:hidden; background:#000; font-family:sans-serif; }

    canvas { position:fixed; inset:0; width:100%!important; height:100%!important; }

    #overlay {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#111; color:#fff; z-index:10;
      gap:14px; transition:opacity 0.5s;
    }
    .spinner {
      width:48px; height:48px;
      border:4px solid #333; border-top-color:#00e5ff;
      border-radius:50%; animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #overlay p { font-size:13px; color:#aaa; text-align:center; max-width:260px; line-height:1.5; }

    #status {
      position:fixed; top:20px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.6); color:#fff; font-size:13px;
      padding:8px 18px; border-radius:20px; z-index:20;
      pointer-events:none; white-space:nowrap;
      transition:opacity 0.4s;
    }

    #crosshair {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:32px; height:32px; z-index:20; pointer-events:none; opacity:0.6;
    }
    #crosshair::before,#crosshair::after {
      content:''; position:absolute; background:#00e5ff; border-radius:2px;
    }
    #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
    #crosshair::after  { width:100%; height:2px; top:50%; transform:translateY(-50%); }

    #ui {
      position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
      display:flex; gap:10px; z-index:20;
    }
    .btn {
      padding:13px 20px; border-radius:50px; border:none;
      cursor:pointer; font-size:14px; font-weight:bold;
      backdrop-filter:blur(8px); transition:transform 0.1s;
    }
    .btn:active { transform:scale(0.93); }
    #btn-place   { background:rgba(0,229,255,0.9); color:#000; }
    #btn-clear   { background:rgba(255,60,60,0.8);  color:#fff; }
    #btn-recenter{ background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.35); }
  </style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <strong>Iniciando AR…</strong>
  <p>Apunta la cámara al suelo y mueve el teléfono lentamente para calibrar el espacio.</p>
</div>

<div id="status">Esperando SLAM…</div>
<div id="crosshair"></div>

<div id="ui" style="display:none">
  <button class="btn" id="btn-recenter">↺ Recentrar</button>
  <button class="btn" id="btn-place">＋ Colocar</button>
  <button class="btn" id="btn-clear">✕ Borrar</button>
</div>

<canvas id="canvas"></canvas>

<script>
// ── esperar a que XR8 esté disponible ──────────────────
function onXR8Ready(cb) {
  if (window.XR8) { cb(); return; }
  window.addEventListener('xrloaded', cb, { once: true });
}

onXR8Ready(initAR);

function initAR() {
  const canvas   = document.getElementById('canvas');
  const overlay  = document.getElementById('overlay');
  const statusEl = document.getElementById('status');
  const ui       = document.getElementById('ui');

  // ── Three.js setup ──────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr = { isPresenting: false }; // evitar conflicto con WebXR

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
  scene.add(camera);

  // Luces
  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(1, 3, 2);
  scene.add(dir);

  // Colores y formas
  const COLORS = [0x00e5ff, 0xff6b6b, 0xffd93d, 0x6bcb77, 0xc77dff, 0xff9f43];
  const objects = [];
  let count = 0;

  function makeGeo(i) {
    switch(i % 5) {
      case 0: return new THREE.BoxGeometry(0.2, 0.2, 0.2);
      case 1: return new THREE.SphereGeometry(0.12, 16, 16);
      case 2: return new THREE.CylinderGeometry(0.08, 0.08, 0.22, 16);
      case 3: return new THREE.ConeGeometry(0.12, 0.24, 16);
      case 4: return new THREE.TorusGeometry(0.1, 0.04, 12, 24);
    }
  }

  function placeObject() {
    const geo = makeGeo(count);
    const mat = new THREE.MeshStandardMaterial({ color: COLORS[count % COLORS.length] });
    const mesh = new THREE.Mesh(geo, mat);

    // 1.2m frente a la cámara, apoyado en Y=0 (suelo)
    const forward = new THREE.Vector3(0, 0, -1.2).applyQuaternion(camera.quaternion);
    forward.y = 0; // proyectar al plano horizontal
    forward.normalize().multiplyScalar(1.2);

    mesh.position.set(
      camera.position.x + forward.x,
      0.12, // mitad del objeto sobre el suelo
      camera.position.z + forward.z
    );

    // escala 0 → animación de aparición vía update loop
    mesh.scale.setScalar(0);
    mesh.userData.born = performance.now();
    mesh.userData.rotSpeed = 0.8 + Math.random() * 0.5;

    scene.add(mesh);
    objects.push(mesh);
    count++;

    setStatus(`Objeto #${count} colocado`);
    setTimeout(() => { statusEl.style.opacity = '0'; }, 2200);
  }

  function clearObjects() {
    objects.forEach(m => scene.remove(m));
    objects.length = 0;
    count = 0;
    setStatus('Escena limpia');
    setTimeout(() => { statusEl.style.opacity = '0'; }, 2000);
  }

  function setStatus(msg) {
    statusEl.textContent = msg;
    statusEl.style.opacity = '1';
  }

  // ── XR8 pipeline ────────────────────────────────────
  XR8.addCameraPipelineModules([
    XR8.GlTextureRenderer.pipelineModule(),   // feed de cámara al canvas
    XR8.Threejs.pipelineModule(),              // integración Three.js
    XR8.XrController.pipelineModule(),         // SLAM / world tracking
    {
      name: 'slam-ar-app',
      onStart({ canvas: c, GLctx }) {
        // Conectar la cámara Three.js que provee XR8
        const { camera: xrCam, scene: xrScene } = XR8.Threejs.xrScene();
        // Agregar nuestros objetos y luces a la escena de XR8
        xrScene.add(...scene.children);
        // Usar la cámara de XR8 para renderizar
        Object.assign(camera, xrCam); // sincronizar referencia
      },
      onUpdate({ processCpuResult }) {
        // Actualizar animaciones
        const now = performance.now();
        objects.forEach(mesh => {
          const age = (now - mesh.userData.born) / 300; // 300ms para escalar
          if (age < 1) mesh.scale.setScalar(Math.min(age, 1));
          mesh.rotation.y += 0.01 * mesh.userData.rotSpeed;
        });
      },
    },
  ]);

  XR8.XrController.configure({
    disableWorldTracking: false,
  });

  XR8.run({ canvas });

  // Evento: SLAM listo
  canvas.addEventListener('reality.projectwallclock', () => {});

  // XR8 dispara este evento cuando el tracking está activo
  window.addEventListener('reality.imagescanning', () => {});

  // Detectar cuando el world tracking se inicializa
  canvas.addEventListener('reality.meshfound', showReady);
  // fallback: si en 4s no hay mesh, igual mostramos la UI
  setTimeout(showReady, 4000);

  function showReady() {
    overlay.style.opacity = '0';
    setTimeout(() => { overlay.style.display = 'none'; }, 500);
    ui.style.display = 'flex';
    setStatus('¡Listo! Toca el suelo o usa los botones');
    setTimeout(() => { statusEl.style.opacity = '0'; }, 3500);
  }

  // Resize
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  // Botones
  document.getElementById('btn-place').addEventListener('click', placeObject);
  document.getElementById('btn-clear').addEventListener('click', clearObjects);
  document.getElementById('btn-recenter').addEventListener('click', () => {
    XR8.XrController.recenter();
    setStatus('Recentrado');
    setTimeout(() => { statusEl.style.opacity = '0'; }, 2000);
  });

  // Tap en canvas también coloca objeto
  canvas.addEventListener('click', (e) => {
    if (e.target.closest && e.target.closest('#ui')) return;
    placeObject();
  });
}
</script>
</body>
</html>
